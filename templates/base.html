<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Store Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Simple DataTables CSS -->
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@latest/dist/style.css" rel="stylesheet" type="text/css">
    <!-- Google Fonts: Gamer Style (Orbitron) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="gamer-theme">
   
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand text-primary fw-bold gamer-font" href="/">
                <i class="fa-solid fa-gamepad me-2"></i> SUPER STORE
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="topNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2 ms-4">
                    <li class="nav-item">
                        <a class="nav-link btn btn-outline-primary btn-sm gamer-font text-uppercase px-3 {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="fa-solid fa-chart-pie me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-outline-primary btn-sm gamer-font text-uppercase px-3 {% if request.path == '/detalle' %}active{% endif %}" href="/detalle">
                            <i class="fa-solid fa-database me-1"></i> Base de Datos
                        </a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center gap-4">
                    <!-- Error Indicator -->
                    <div id="connection-status" class="d-none text-danger gamer-font small">
                        <i class="fa-solid fa-triangle-exclamation"></i> Error BD
                    </div>
                    
                    <div class="clock-display text-white fw-bold fs-5 gamer-font" id="realtime-clock">00:00:00</div>
                    <button class="btn btn-outline-light btn-sm rounded-circle theme-btn" id="theme-toggle" title="Cambiar Tema">
                        <i class="fa-solid fa-sun" id="theme-icon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    
    <div class="container-fluid p-4 main-content">
    
        <div id="global-alert" class="alert alert-danger d-none gamer-font" role="alert"></div>
        
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@latest" type="text/javascript"></script>
    
    <script>
        // Reloj en tiempo real
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('es-ES', { hour12: false });
            document.getElementById('realtime-clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Botón modo día/noche
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.getAttribute('data-bs-theme') === 'dark') {
                html.setAttribute('data-bs-theme', 'light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            } else {
                html.setAttribute('data-bs-theme', 'dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        });
        
        // Función global para mostrar errores de fetch en la UI
        window.showError = function(message) {
            const alertBox = document.getElementById('global-alert');
            const status = document.getElementById('connection-status');
            alertBox.textContent = message;
            alertBox.classList.remove('d-none');
            status.classList.remove('d-none');
        };
    </script>

</body>
</html>
