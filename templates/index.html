<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperStore Admin - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>SuperStore <span>Admin</span></h1>
        <div class="user-info">12:19 p. m. 🌙</div>
    </header>

    <main>
        <section class="filters">
            <div class="filter-group">
                <label>Segmento:</label>
                <select id="filter-segment">
                    <option value="all">Todos...</option>
                    {% for segment in filters.segments %}
                    <option value="{{ segment }}">{{ segment }}</option>
                    {% endfor %}
                </select>
            </div>
            <button onclick="fetchDashboardData()" class="btn-update">Actualizar</button>
        </section>

        <section class="kpi-container">
            <div class="kpi-card">
                <h3>Total de Clientes</h3>
                <p id="total-clientes">0</p>
            </div>
            <div class="kpi-card">
                <h3>Clientes Activos</h3>
                <p id="clientes-activos">0</p>
            </div>
            <div class="kpi-card">
                <h3>Ticket Promedio</h3>
                <p id="ticket-promedio">$0.00</p>
            </div>
            <div class="kpi-card">
                <h3>Ventas Prom. por Cliente</h3>
                <p id="ventas-promedio">$0.00</p>
            </div>
        </section>

        <section class="table-container">
            <h3>Detalle de Clientes</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>ID Cliente</th>
                        <th>Nombre</th>
                        <th>Segmento</th>
                        <th>Región</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
